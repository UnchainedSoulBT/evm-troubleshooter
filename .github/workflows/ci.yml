name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  ETH_RPC_URL: ${{ vars.ETH_RPC_URL || 'https://ethereum-rpc.publicnode.com' }}

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm build
        env:
          # canary secrets: the bundle check asserts these never reach the client
          ETHERSCAN_API_KEY: ci-canary-etherscan-0123456789abcdef
          RPC_URL_1: https://paid.example.com/ci-canary-rpc-fedcba987654
      - run: ./scripts/check-bundle-secrets.sh
        env:
          ETHERSCAN_API_KEY: ci-canary-etherscan-0123456789abcdef
          RPC_URL_1: https://paid.example.com/ci-canary-rpc-fedcba987654
      - run: pnpm test

  fork-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: foundry-rs/foundry-toolchain@v1
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:fork
      - run: pnpm --filter e2e exec playwright install --with-deps chromium
      - run: pnpm test:e2e
